<!DOCTYPE html>

        :root {

            --glass-bg: rgba(255, 255, 255, 0.09);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {

            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background-attachment: fixed;
            overflow-x: hidden;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 80px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .avatar {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            background: url('https://pbs.twimg.com/profile_images/2021988620333404160/ZizmGr0N.jpg') center/cover no-repeat;
            border: 8px solid rgba(255, 122, 0, 0.6);
            box-shadow: 
                0 0 0 12px rgba(255, 122, 0, 0.15),
                0 25px 50px -12px rgba(0, 0, 0, 0.4),
                inset 0 0 40px rgba(255, 255, 255, 0.3);
            position: relative;
        }
        
        .avatar::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.4));
            opacity: 0.25;
            z-index: -1;
        }
        
        .name {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
        }
        
        .tagline {
            font-size: 1.25rem;
            opacity: 0.85;
            margin-top: 8px;
        }
        
        .bio {
            max-width: 520px;
            font-size: 1.35rem;
            opacity: 0.9;
            margin-top: 8px;
        }
        
        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
        }
        
        .section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(24px);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.15);
        }
        
        h2 {
            font-size: 1.85rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
            color: #fff;
            text-align: center;
        }
        
        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 122, 0, 0.3);
            border-radius: 16px;
            padding: 22px 28px;
            color: white;
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(255, 122, 0, 0.1);
        }
