<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tate brown</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --pink: #ff69b4;
            --cyan: #00f0ff;
            --lime: #39ff14;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0d001a url('https://images.unsplash.com/photo-1617791160588-241658c0f566?q=80&w=1920') center/cover fixed;
            color: #fff;
            font-family: 'VT323', monospace;
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 760px; margin: 40px auto; padding: 20px; }

        header {
            text-align: center;
            border: 4px solid var(--pink);
            background: rgba(10, 0, 30, 0.95);
            padding: 30px 20px;
            box-shadow: 0 0 0 8px #000;
        }

        .logo {
            font-family: 'Press Start 2P', system-ui;
            font-size: 3.8rem;
            color: #fff;
            text-shadow: 4px 4px 0 #ff00ff,
                        -2px -2px 0 #00ffff;
            letter-spacing: 6px;
        }

        .bio {
            margin: 30px 0;
            font-size: 1.45rem;
            background: rgba(0,0,0,0.8);
            border: 3px solid var(--cyan);
            padding: 25px;
        }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .link-btn {
            background: #110022;
            border: 4px solid var(--pink);
            color: white;
            font-size: 1.5rem;
            padding: 24px 16px;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .link-btn:hover {
            background: #220033;
            border-color: var(--cyan);
            transform: translate(-4px, -4px);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 1.1rem;
            color: #aaa;
        }

        .trump {
            text-align: center;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <div class="logo">TATE BROWN</div>
            <p style="margin-top:12px; font-size:1.6rem; color:#ff69b4;">resident zoomer apologist @ timcast</p>
        </header>

        <div class="bio">
            6'2<br>
            IQ 85 (tested)<br>
            African explorer<br>
            Host @TimcastNews
        </div>

        <div class="trump">
            <img src="https://media.giphy.com/media/3o7TKsQ8v0QJ0pL8vO/giphy.gif" width="320" alt="Trump dancing" style="image-rendering: pixelated; border: 4px solid #ff00ff;">
        </div>

        <div class="links">
            <a href="https://x.com/realTateBrown" target="_blank" class="link-btn">X → @realTateBrown</a>
            <a href="https://www.instagram.com/realtatebrown/" target="_blank" class="link-btn">INSTAGRAM</a>
            <a href="https://timcast.com/" target="_blank" class="link-btn">TIMCAST IRL</a>
            <a href="https://www.youtube.com/@TimcastIRL" target="_blank" class="link-btn">YOUTUBE</a>
            <a href="https://www.youtube.com/@TimcastTateBrown" target="_blank" class="link-btn">CLIPS</a>
        </div>

        <footer>
            2001 • best viewed on a CRT • no filter
        </footer>
    </div>
</body>
</html>
