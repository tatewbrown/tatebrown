<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tate brown</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --hotpink: #ff69b4;
            --cyan: #00f0ff;
            --purple: #c724ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a001f url('https://images.unsplash.com/photo-1617791160588-241658c0f566?q=80&w=1920') center/cover fixed;
            color: #fff;
            font-family: 'VT323', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            max-width: 720px; 
            margin: 40px auto; 
            padding: 20px; 
            background: rgba(10, 0, 25, 0.85);
            border: 6px solid var(--hotpink);
            box-shadow: 0 0 40px var(--hotpink);
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        .logo {
            font-family: 'Press Start 2P', system-ui;
            font-size: 3.6rem;
            color: white;
            text-shadow: 3px 3px 0 var(--hotpink),
                        -3px -3px 0 var(--cyan);
            letter-spacing: 4px;
        }

        .tag {
            font-size: 1.5rem;
            color: var(--cyan);
            margin-top: 8px;
        }

        .bio {
            text-align: center;
            font-size: 1.55rem;
            line-height: 1.5;
            margin: 35px 0;
            padding: 25px;
            border: 3px solid var(--purple);
            background: rgba(0,0,0,0.6);
        }

        .gif {
            text-align: center;
            margin: 30px 0;
        }

        .gif img {
            width: 280px;
            border: 5px solid var(--hotpink);
            image-rendering: pixelated;
        }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .link-btn {
            background: rgba(20, 0, 40, 0.9);
            border: 4px solid var(--hotpink);
            color: white;
            font-size: 1.55rem;
            padding: 22px 16px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: rgba(50, 0, 80, 0.95);
            border-color: var(--cyan);
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 0 25px var(--cyan);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <div class="logo">TATE BROWN</div>
            <div class="tag">resident zoomer apologist @ timcast</div>
        </header>

        <div class="bio">
            6'2<br>
            IQ 85 (tested)<br>
            African explorer<br>
            host on timcast irl
        </div>

        <div class="gif">
            <img src="https://media1.tenor.com/m/b_ElccO6WBgAAAAd/soyjak-soyjak-dancing.gif" alt="soy dancing">
        </div>

        <div class="links">
            <a href="https://x.com/realTateBrown" target="_blank" class="link-btn">X → @realTateBrown</a>
            <a href="https://www.instagram.com/realtatebrown/" target="_blank" class="link-btn">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@tatebrown09" target="_blank" class="link-btn">TIKTOK</a>
            <a href="https://timcast.com/" target="_blank" class="link-btn">TIMCAST IRL</a>
            <a href="https://rumble.com/c/Timcast" target="_blank" class="link-btn">RUMBLE</a>
            <a href="https://www.youtube.com/@TimcastIRL" target="_blank" class="link-btn">YOUTUBE</a
